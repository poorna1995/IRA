# configs/datasets.yaml
# ─────────────────────────────────────────────────────────────
# Master configuration for all benchmark datasets.
# Each entry controls: how the loader downloads, which split
# to use, how many samples to load, and what the canonical
# column names are after normalization.
# ─────────────────────────────────────────────────────────────

swe_bench:
  display_name: "SWE-Bench Verified"
  hf_repo: "princeton-nlp/SWE-bench_Verified"
  split: "test"
  max_samples: 500 # set null to load all
  source: huggingface
  canonical_columns:
    id: "instance_id"
    query: "problem_statement" # the GitHub issue text
    answer: "patch" # gold patch (for reference)

    metadata:
      - "difficulty"
      - "repo"
      - "base_commit"
      - "version"
  complexity_hints:
    # number of files changed → natural difficulty proxy

    proxy_field: null # computed at load time
  notes: >
    Verified subset of SWE-Bench (500 instances). Each task is a
    real GitHub issue. Multi-agent relevant: planner + coder + tester.

gaia:
  display_name: "GAIA (Level 1-3)"
  hf_repo: "gaia-benchmark/GAIA"
  split: "validation"
  max_samples: Null # full validation set ~450
  source: huggingface
  hf_config: "2023_all" # config name in GAIA repo
  canonical_columns:
    id: "task_id"
    query: "Question"
    answer: "Final answer"
    metadata:
      - "Level" # 1 (easy) to 3 (hard) — built-in difficulty!
      - "Annotator Metadata"
  complexity_hints:
    proxy_field: "Level" # directly usable as ground-truth difficulty
    proxy_range: [1, 3]
  notes: >
    GAIA has annotated difficulty levels (1-3), making it uniquely
    valuable as a ground-truth complexity signal to validate our estimators.
    Requires tool use and multi-step reasoning.

mmlu_pro:
  display_name: "MMLU-Pro"
  hf_repo: "TIGER-Lab/MMLU-Pro"
  split: "test"
  max_samples: Null # full test set ~12k; 2k is representative
  source: huggingface
  canonical_columns:
    id: "question_id"
    query: "question"
    answer: "answer"
    answer_index: "answer_index"
    choices: "options"
    metadata:
      - "category"
      - "cot_content"
  complexity_hints:
    proxy_field: null
    stratify_by: "category" # sample across all 14 categories
  notes: >
    10-option MCQ across 14 domains. Harder than MMLU (fewer giveaway
    distractors). Good for model-agnostic complexity estimation since
    choice count is fixed. Covers both easy and hard domains.

musique:
  display_name: "MuSiQue (Multi-hop)"
  hf_repo: "dgslibisey/MuSiQue"
  split: "validation"
  max_samples: null
  source: huggingface
  canonical_columns:
    id: "id"
    query: "question"
    answer: "answer"
    metadata:
      - "answerable" # filter to answerable only
      - "question_decomposition" # sub-questions list — key complexity proxy!
      - "paragraphs"
  complexity_hints:
    proxy_field: "decomposition" # length of decomposition = num hops
    proxy_range: [2, 4] # 2-hop to 4-hop questions
  notes: >
    Multi-hop QA with explicit sub-question decompositions. The number
    of hops (2, 3, 4) is a clean, interpretable complexity axis.
    Ideal for validating structural complexity estimators.

aime:
  display_name: "AIME Hard (2024)"
  hf_repo: "HuggingFaceH4/aime_2024"
  split: "train" # only split available
  max_samples: null # small dataset (~900 total); load all
  source: huggingface
  filter:
    year_gte: 2024 # recent AIME problems are harder
  canonical_columns:
    id: "ID"
    query: "Problem"
    answer: "Answer" # integer 0-999
    metadata:
      - "url"
      - "solution"
      - "Year"
  complexity_hints:
    proxy_field: null
    notes: "AIME II is systematically harder than AIME I"
  notes: >
    Very high difficulty math competition problems (answer is integer 0-999).
    Almost all current LLMs fail on these. Useful for probing the hard end
    of complexity estimators. Small dataset — use all samples.
